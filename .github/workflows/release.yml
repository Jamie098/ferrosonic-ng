name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Linux binary
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libdbus-1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.78.0

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --locked

      - name: Prepare release asset
        run: |
          cp target/release/ferrosonic target/release/ferrosonic-${{ github.ref_name }}-linux-amd64
          sha256sum target/release/ferrosonic-${{ github.ref_name }}-linux-amd64 > target/release/ferrosonic-${{ github.ref_name }}-linux-amd64.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/ferrosonic-${{ github.ref_name }}-linux-amd64
            target/release/ferrosonic-${{ github.ref_name }}-linux-amd64.sha256
          generate_release_notes: true
